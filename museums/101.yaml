name: The Marine Mammal Center
address: 2000 Bunker Road, Fort Cronkhite, Sausalito, CA 94965
wikipedia_url: https://en.wikipedia.org/wiki/The_Marine_Mammal_Center
description: 'The Marine Mammal Center in Sausalito, CA is the largest hospital for marine mammals in the world. Established
  in 1973, today the center is responsible for rescues along 600 miles of California coastline, from the edge of Humboldt
  county in Northern California down to San Luis Obispo county in the south.


  The center’s current headquarters opened in 1975 on the site of an old Nike missile site (see [Nike Missile Site SF-88](https://www.niche-museums.com/11)
  nearby). The underground silos now house the center’s water filtration system.


  In 2018 the center treated 802 marine mammals with the help of more than 1,200 volunteers. Patients include elephant seals,
  California sea lions, Guadalupe and northern fur seals, harbor seals and the occasional sea otter.


  Weekend guided tours are offered at 11am, 1pm and 3pm, and the animals tend to be fed between 1:30 and 2:30pm which makes
  that an excellent time to watch from the viewing deck.'
