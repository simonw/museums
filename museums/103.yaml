description: 'Stanley Hiller Jr. designed and produced a working model of the world''s first successful coaxial helicopter
  at the age of 15. In 1944 at 17 he had established the first helicopter factory on the West Coast.


  Hiller''s career as a helicopter entrepreneur lasted until 1966, when Hiller Helicopters merged with Fairchild Industries
  and Hiller reinvented himself as a venture capitalist and company turnaround specialist.


  The Hiller Aviation museum was founded in 1998, originally to house Hiller''s own collection of helicopter prototypes and
  historic aircraft. It has since grown to specialize in Northern California aircraft and helicopter history.


  The collection includes one of just two surviving prototypes of the 1955 Hiller Flying Platform, the front 45 feet of a
  Boeing 747, the SoloTrek XFV (Exo-skeletal Flying Vehicle) and a Grumman HU-16 Albatross that was the first of its kind
  to circumnavigate the earth.


  The museum has its own workshop, which both restores existing aircraft exhibits and builds replicas of historic aircraft
  for display at the museum.'
