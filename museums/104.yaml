address: 7981 Moss Landing Road, Moss Landing, CA 95039
description: 'In 1972 R. Thad Taylor, Founding President of the Shakespeare Society of America, rented a warehouse in West
  Los Angeles and the society constructed a half-scale replica of the interior of Shakespeare''s London Globe as it existed
  in 1599, building from an unused space drama set donated by Ray Bradbury.


  They staged all 38 Shakespeare plays there, in order, from 1976 to 1979 and then again from 1981 to 1984.


  After his passing in 2006 the society was forced to relocate. Terry Taylor, R. Thad Taylor''s nephew, moved their assets
  to this building in Moss Landing in 2008, designating it the New Shakespeare Sanctuary.


  Their collection includes rare books, playbills, posters, photographs, slides, props, costumes and an eight-foot sculpture
  of Shakespeare that was commissioned for the 1984 Los Angeles Olympics.'
