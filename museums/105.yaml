address: Building 126, Severyns Ave, Moffett Field, CA 94035
description: 'Moffett Field is a joint civil-military airfield in the San Francisco Bay Area, founded in 1930 as a base for
  the U.S. navy airship the USS Macon. Today it is operated by NASA Ames Research Center, with parts of the facility leased
  out to Google.


  The Moffett Field Historical Society occupies Building 126 on the base, right next to Hangar One - one of the world''s largest
  freestanding structures, built in 1933 to house the Macon airship.


  The museum hosts a wide-ranging array of artifacts that help tell the story of the airfield, from its founding in the airship
  era of 1930s through the Second World War, the Cold War and its current association with NASA.


  The museum is entirely volunteer-run, and the exhibits represent an abundance of love and passion. Display cabinets show
  off meticulous model aircraft custom made for the museum. A beautiful diorama illustrates the scale of the USS Macon airship,
  detailed down to the trapezes that were used to launch and recover the biplanes that travelled on board the airship. An
  extensive collection of uniforms dates back to the Second World War.


  Also on display is a Link Trainer - a model of mechanical flight simulator that was used to train pilots from the 1930s
  to the 1950s.


  Don’t miss the opportunity to talk to the docents. Our guide had flown a variety of aircraft out of the base, and provided
  a thrilling description of what it felt like to land on an aircraft carrier and be caught by the aircraft arresting gear
  now on display in the museum.


  A small room in the back of the museum hosts a model railway that is several sizes too big for the room that contains it.
  This actually predates the museum: it was built when the building served as a recreation room for the Navy in the 1980s,
  and is now cared for as part of the museum’s collection.


  Note that you’ll be asked to show state photo ID at the entrance to the base if you want to visit the museum. International
  passports are accepted too.'
