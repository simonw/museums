name: Mendenhall's Museum of Gasoline Pumps & Petroliana
url: https://www.mendenhallmuseum.com/
photo_url: https://niche-museums.imgix.net/mendenhalls.jpeg
photo_alt: A beautiful collection of old gasoline pumps
address: 24 Zaca St, Buellton CA, 93427
description: "Tucked away in the tiny town of Buellton, California is this absolute treat of a museum.\n\nJack Mendenhall\
  \ sold his service station in 1978 and took to the road as a traveling salesman. He began collecting memorabilia relating\
  \ to the auto and gasoline industries, and continued collecting right up until his passing in 2005. His son Mark and daughter-in-law\
  \ Vickie took responsibility for the collection and continue to expand it, living in an apartment above the museum.\n\n\
  Today, Mendenhall’s Museum of Gasoline Pumps and Petroliana displays dozens of gas pumps, over 200 oil cans, more than 400\
  \ porcelain gas pump globes, thousands of license plates and gas station signs, over 40 neon signs and several classic and\
  \ historic racing cars. \n\nJack was also a keen dry lakes racer, becoming a member of the exclusive 200mph club in 1991.\
  \ His son Mark achieved that goal in 1996, in the same 1932 Ford Roadster (nicknamed “Sally the Salt Dancer”) now displayed\
  \ in the museum.\n\nThe museum is home to the Dry Lakes Racing Hall of Fame and hosts its annual induction ceremony every\
  \ April.\n\nMendenhall's museum can only be visited on a guided tour, which needs to be booked in advance."
latitude: 34.612
longitude: -120.195
