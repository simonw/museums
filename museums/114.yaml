photo_alt: The entrance to the Coutellerie Nontronnaise - a striking wooden plank frontage showing the name and the iconic
  Nontron arch logo.
address: Place Paul Bert, 24300 Nontron
description: 'Coutellerie Nontronnaise manufactures the **Nontron knife**, one of the oldest knife brands in France. The Nontron
  knife-making tradition started with Guillaume Legrand in 1654, followed by his son and grandson, both named Jean Legrand.
  The current company was established in 1928.


  Today the business is a combination museum and workshop. Visitors can explore the exhibits and purchase knives upstairs,
  then look down from an observation gallery to the workshop below where around 20 artisans craft knives, using a Boxwood
  plus a variety of other woods and stainless, carbon or Damascus steel. Each knife is handmade through a process involving
  39 steps.


  The museum includes a delightful collection of miniature knives, previously a speciality of the craftsmen in Nontron. The
  smallest of these is just 5mm and fits inside a hazelnut shell!


  They hold a Guinness World Record (1989) for the smallest folding knife, 10mm long made for the July 1987 Festival of Aubigny
  in Vendée. The knife is displayed in the museum along with a copy of the world record certificate.


  Coutellerie Nontronnaise is one of 1,277 companies with [Entreprise du patrimoine vivant](https://fr.wikipedia.org/wiki/Entreprise_du_patrimoine_vivant)
  "Living heritage company" status (and one of [just 9](https://lite.datasette.io/?csv=https://gist.github.com/simonw/eef8f14394dfc21d82be0535f4b09036#/data/raw?_sort=rowid&_facet=Libell%C3%A9+NAF&_facet_size=max&Libell%C3%A9+NAF=Fabrication+de+coutellerie+%2825.71Z%29&_facet=R%C3%A9gion)
  that are categorized as "Fabrication de coutellerie" or "Cutlery manufacturing"), which they received in 2010. They also
  have [a blog](https://couteau-nontron-france.fr/).'
