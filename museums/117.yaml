name: The New York Earth Room
url: https://www.diaart.org/visit/visit-our-locations-sites/walter-de-maria-the-new-york-earth-room-new-york-united-states
address: 141 Wooster Street, New York, NY 10012
description: 'On the second floor of 141 Wooster Street in New York''s SoHo district there is a 3,600 square foot room filled
  with earth - 280,000 pounds of it, first installed in 1977 and maintained there ever since.


  This is the New York Earth Room, a piece of installation art by Walter De Maria, originally planned as a three month exhibition
  which has now stretched into its sixth decade.


  This is actually the third instance of the Earth Room, a sequel to the 1968 Earth Room in Galerie Heiner Friedrich in Munich
  and a second in 1974 at Hessisches Landesmuseum in Darmstadt. Only this edition survives.


  The exhibit is owned and maintained by the Dia Art Foundation, who also own the entire 2nd floor. The foundation was founded
  in 1974 by Philippa de Menil, an heiress to the Schlumberger oil exploration fortune, her husband art dealer Heiner Friedrich,
  and Houston art historian Helen Winkler.


  The [foundation''s mission](https://www.diaart.org/about/about-dia) includes "to help artists achieve visionary projects
  that might not otherwise be realized because of scale or scope." The Earth Room is a prominent example.


  The earth itself is a mixture of peat and bark, most of which is the original earth from the 1970s. The curators till the
  soil twice a year and occasionally wet it to avoid it turning into dust. They topped it up with fresh soil in 2022 to compensate
  for it compacting down over the years.


  The Earth Room is free to visit but guests are asked not to take any photographs to respect the wishes of the artist. It
  has a curator who will answer questions about the artwork - painter Bill Dilworth staffed the desk from 1989 until his retirement
  in 2024.'
