id: 21
name: DEVIL-ish Little Things
url: https://www.facebook.com/DEVILishLittleThingsMuseum/
address: 3409 L Street, Vancouver, Washington
description: 'Marion Held has been collecting devils for twenty years - novelty objects mainly from Europe, depicting the
  Devil, Krampus, Mephisto and more.


  Marion assured us that there was nothing satanic about her collection: "These are European devils: they sit on your shoulder
  and they tell you to drink!"


  Her collection is now available to see in her home - a converted church - by appointment only.'
