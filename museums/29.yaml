id: 29
name: La Galcante
url: https://www.lagalcante.com/
address: 52 rue de l'Arbre Sec, 75001 Paris, France
description: 'Founded in 1975 with the aim of becoming a museum, La Galcante today is a unique store specializing in ephemeral
  publications: newspapers, magazines, maps, photographs, postcards and more. Some items date back to the 18th century, and
  the archives here include French and international dailies, society magazines and obscure periodicals. Film directors such
  as Martin Scorsese have rented material from La Galcante to use as props.'
