id: 30
name: Musée des Arts et Métiers
url: https://www.arts-et-metiers.net/
address: 60 Rue Réaumur, 75003 Paris, France
description: Established in 1794 during the French revolution to preserve scientific instruments and inventions - including
  the laboratory of "father of modern chemistry" Antoine Lavoisier who met his fate at the guillotine. The collection today
  represents three centuries of French craft and invention, including Foucault’s pendulum, the original model of the Statue
  Liberty, mechanical looms and a delightful gallery of automata including one that belonged to Marie Antoinette.
