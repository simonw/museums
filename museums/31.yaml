name: International Women's Air & Space Museum
url: http://iwasm.org/
address: Burke Lakefront Airport, Room 165, 1501 North Marginal Road, Cleveland, Ohio
description: Artifacts and displays relating to the history of women in aviation and space. The museum tells the story of
  pioneering aviators such as Harriet Quimby, the first American woman to earn her pilot's license and the first woman to
  fly across the English channel (in 1912). Also home to the first soft drink dispenser used in space!
