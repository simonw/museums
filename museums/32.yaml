id: 32
name: West Kern Oil Museum
url: https://www.westkern-oilmuseum.org/
address: 1168 Wood Street, Taft, CA 93268
description: Volunteer run museum covering the history of the oil industry in the local area. They have the world's only surviving
  wooden oil derrick, a photo exhibit covering the 1910 Lakeview Gusher oil spill and a wonderfully eclectic collection of
  both indoor and outdoor exhibits.
photo_url: https://niche-museums.imgix.net/west-kern-oil.heic
photo_alt: An old truck and some historic oil equipment.
