name: California State Capitol Dioramas
url: http://www.capitolmuseum.ca.gov/
address: State Capitol, Room B-27, 1315 10th Street, Sacramento, CA 95814
description: The California State Capitol proudly displays a diorama for every one of California's 58 counties. The dioramas
  are of varying quality. The process by which they are created and updated over the years is entirely uncoordinated, and
  appears to be driven by occasional outcries of shame from local county media.
