id: 34
name: Zeppelin Museum Friedrichshafen
url: https://www.zeppelin-museum.de
address: Seestraße 22, 88045 Friedrichshafen, Germany
description: Friedrichshafen, the birthplace of the Zeppelin in 1900, now hosts the definitive Zeppelin museum. A full scale
  partial model of the Hindenberg lets you explore a recreation of the bar, cabins and smokers' lounge. They also have an
  original engine nacelle from the LZ 127 Graf Zeppelin and a 3.6 ton Maybach Zeppelin car from 1938, based on the Maybach
  airship engines and capable of a maximum speed of 170 km/h.
