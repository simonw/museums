id: 36
name: Wallace Collection
url: http://www.wallacecollection.org/
address: Hertford House, Manchester Square, London, W1U 3BN, UK
description: Bequeathed to the nation by the widow of the illegitimate son of the 4th Marquess of Hertford in 1897 on the
  condition that no object should ever leave the collection, even for loan exhibitions. The collection includes a vast array
  of French 18th century decorative arts purchased during the revolutionary sales following the French revolution. This includes
  the Laughing Cavalier and a lot of very shiny decorative weapons and armour.
