id: 39
name: San Francisco Cable Car Museum
url: http://www.cablecarmuseum.org/
address: 1201 Mason Street, San Francisco, CA 94108
description: Housed in a historic cable car barn and powerhouse, this free museum tells the story of San Francisco's unique
  under-road cable pulled street cars. In addition to vintage cars and other exhibits illustrating the history of the system
  visitors can descend below the street to see the cables running, or watch the engines that power the cars from a viewing
  platform.
