id: 43
name: Neptune Society Columbarium
url: https://www.neptune-society.com/cremation-articles/why-the-san-francisco-columbarium-is-worth-a-visit/
address: One Loraine Court, San Francisco, CA 94118
description: 'San Francisco has few cemeteries: most of them were relocated to the nearby city of Colma in the 1920s. This
  Columbarium (a repository for human ashes), built in 1898, is now the only non-denominational place in the city that still
  accepts new burials.


  Interments include FORTRAN creator John Backus, politician Harvey Milk and Harry August Jansen, aka Dante the Magician -
  the last representative of the Golden Age of Magic.


  Many of the urns are accompanied by small dioramas representing details from the life of the person interred there.'
