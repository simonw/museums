id: 44
name: Recoleta Cemetery
url: https://turismo.buenosaires.gob.ar/es/atractivo/cementerio-de-la-recoleta
address: Junín 1760, C1113 CABA, Argentina
description: Widely considered one of the most beautiful cemeteries in the world, the Recoleta cemetery hosts 4691 above ground
  vaults, 94 of which have been declared national historic monuments. The cemetery is laid out like a small city with a complex
  network of streets dividing tombs representing nearly two hundred years of architectural styles. The residents tell the
  story of the nation, including presidents, writers, generals, Nobel laureates and Argentinian first lady Eva Perón.
