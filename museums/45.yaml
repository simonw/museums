address: Great Lakes Science Center, 601 Erieside Avenue, Cleveland, OH 44114
description: Relocated from NASA Glenn Research Center to a new home inside the Great Lakes Science Center in 2010, this is
  one of just eleven NASA visitor centers in the USA. See inside the Apollo Command Module used in the 1973 Skylab 3 mission
  and celebrate Ohio's status as the fourth-largest producer of astronauts in the United States (25 astronauts so far).
