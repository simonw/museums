name: The Comic Rock Star’s Toilet Seat Museum
url: http://isotopecomics.com/index.php/tag/comic-rockstars-toiletseat-museum
address: 326 Fell Street, San Francisco, CA 94102
description: Voted "Best Comic Store" in Best of the Bay for 17 years running (2002 - 2018), Isotope Comic Book Lounge plays
  host to a unique museum of toilet seats. The collection was founded by accident in 2002 when Brian Wood (DMZ and X-Men)
  vandalized their bathroom and owner James Sime kept the toilet seat. Over 100 comic artists have now contributed illustrated
  seats, and a subset of the collection can be seen lining the walls of the lounge.
