name: Fabergé Museum, Baden-Baden
url: http://www.faberge-museum.de/index.php?lang=en
address: Sophienstraße 30, 76530, Baden-Baden, Deutschland
description: 'Alexander Ivanov opened the Fabergé Museum in Baden-Baden in 2009 to host his collection of over 1,500 items
  made by Russian jewelry firm House of Fabergé. The firm was founded in 1842 and is most famous for making jewel-encrusted
  Fabergé eggs for the Russian Tsars.


  The museum holds at least one of those Imperial Easter Eggs - the Karelian Birch egg, which was ordered by the Tsar for
  Easter 1917 but was delivered after he had been deposed during the Russian revolution.


  The museum also holds one of two known versions of the Constellation Egg, which it claims is the finished original. This
  claim is disputed.'
