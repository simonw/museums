name: jAdis
url: http://www.jadisprops.com/
address: 2701 Main Street, Santa Monica, CA 90405
description: jAdis is a shop, prop rental place and curiosity cabinet “dedicated to imagination and wonder”. Parke Meeke and
  Susan Lieberman opened Jadis on Main Street in the mid-1970s and began collecting and constructing objects along a theme
  that can best be described as a mad scientist laboratory. Items from jAdis have featured in movies such as The Artist, The
  Prestige, Batman and Robin, and Van Helsing along with many different TV shows.
