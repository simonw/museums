name: Lundy
url: https://www.landmarktrust.org.uk/lundyisland/
address: Lundy Island, Bideford EX39 2LY, United Kingdom
description: 'Can an entire island be classified as a niche museum? In Lundy''s case I''d say yes. Accessible only by a twelve
  mile, two hour boat ride from north Devon, Lundy is a spectacular island in the Bristol Channel with a fascinating history.


  The island has three light houses, a charming little village, a church, numerous ruins and a castle that was built in the
  13th century by Henry III after he retook the island from the apparently traitorous William de Marisco.


  Thanks to the Landmark Trust you can stay in many of the buildings (including the castle). Lundy is Britain''s first Marine
  Conservation Zone, playing host to wildlife that includes puffins and Atlantic grey seals. It also offers excellent letterboxing.'
