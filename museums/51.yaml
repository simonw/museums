name: Neon Works
url: http://www.neonwks.com/
address: 967 Grace Avenue, Oakland, CA 94608
description: 'Neon Works is a neon sign fabrication and restoration business based in a 17,000-square-foot studio in North
  Oakland.


  Founder Jim Rizzo also collects historic neon signs, and displays them in the workshop. Any time he hears about a Neon sign
  being taken down anywhere in the Bay Area Jim will swoop in and see what can be salvaged.


  His collection has signs from throughout the previous century, including the 1500 pound 42 foot long Kilpatrick''s Bakery
  sign rescued from 16th and Folsom street in San Francisco in the late 1990s.


  Neon Works carried out the $70,000 restoration of the Castro Theatre’s 85 foot tall sign for the production of “Milk” in
  2008.


  The workshop is not open to the public, but occasionally hosts tours.'
