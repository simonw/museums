address: 48, rue Brizeux, 29680 Roscoff, France
description: 'Starting in the 1820s, farmers from the area around Roscoff in Brittany started crossing the channel to sell
  onions in Wales and England. Known as Onion Johnnies, they became the stereotypical image of the French to the English,
  riding bicycles hung with onions and wearing berets and striped shirts. Their activity peaked in 1929 when over 9000 tonnes
  of onions were imported by nearly 1400 Johnnies.


  Their golden age was ended by Import restrictions following World War II, but the trading relationship between Brittany
  and the UK was a key factor in the founding of Brittany Ferries operating out of Roscoff in the 1970s.


  Today they are commemorated by the Onion Johnny museum in Roscoff, which hosts an annual Onion Festival (Fête de l''Oignon)
  every summer.'
