address: The Old New Inn, Bourton-on-the-Water, Gloucestershire GL54 2AF
description: 'The only grade II listed model village in the UK. Opened in 1937, this one-ninth scale replica of Bourton-on-the-Water
  features miniature bonsai-style trees and bridges you can cross.


  Stand close enough to the two churches to hear their choirs singing. Most satisfyingly, the model village includes a model
  of the model village, which itself includes a model of the model of the model village.'
