id: 54
name: Lynton and Lynmouth Cliff Railway
url: https://www.cliffrailwaylynton.co.uk/
address: Lee Road, Lynton EX35 6HW, United Kingdom
description: 'In continuous use since opening in 1890, this water-powered railway joins the two towns of Lynton (at the top)
  and Lynmouth (at the bottom). The 862 foot track covers an elevation of 500 feet making it highest and steepest of the three
  remaining water railways in the world - and the only one in the UK.


  The two carriages are joined by a cable and act as counter-weights to each other, with the carriage at the top of the line
  filling up with water sourced from the nearby Lyn Valley to power the railway. The railway won the bronze award in Devon''s
  Large Attraction of the Year 2018.'
