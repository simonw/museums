address: Clouds Hill, King George V Road, Bovington BH20 7NQ, United Kingdom
description: 'T. E. Lawrence earned international fame thanks to the 1962 film Lawrence of Arabia, a dramatization of his
  World War I activities during the Sinai and Palestine Campaign and the Arab Revolt against the Ottoman Empire.


  Clouds Hill is his cottage in Dorset, bought in 1925 for use as a holiday home. Lawrence was fatally injured in a motorcycle
  accident near Clouds Hill in 1935, just two months after retiring from the army. Today the cottage is managed as a museum
  by the National Trust.'
