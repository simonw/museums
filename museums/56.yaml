name: Pioneertown
url: https://visitpioneertown.com
address: Pioneertown, CA
description: 'Founded in 1946 by actor Dick Curtis - famous for playing the villain in a host of early westerns - as an 1880s
  themed living movie set. Hundreds of television shows and movies have been filmed here since.


  The town has a population of 420 and it''s occasionally possible to stay overnight (check Airbnb). Pappy & Harriet''s Pioneertown
  Palace is a popular music venue on the edge of town that occasionally attracts surprise performances by big name stars.'
