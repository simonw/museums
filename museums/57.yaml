id: 57
name: Teddy Bear Kingdom
url: https://english.huistenbosch.co.jp/amusement/?mode=amuseview&Type=4&no=1253
address: 1-1 Huis Ten Bosch Machi, Sasebo, Nagasaki 859-3292, Japan
description: 'One of five museums within Huis Ten Bosch, Japan’s 375 acre Netherlands-themed theme park near Nagasaki, Teddy
  Bear Kingdom celebrates the glamour of teddy bears.


  Over 700 bears from all over the world are on display, including a Steiff bear made by the company that first popularized
  the toy in the early 1900s.


  Did you know the teddy bear moniker was in honor President Theodore Roosevelt? He features in a sequence  of dioramas that
  tell the history of the teddy bear.'
