id: 58
name: The Centennial Light
url: https://www.centennialbulb.org
address: 'Fire Station #6, 4550 East Avenue, Livermore, CA'
description: 'Burning since 1901, this bulb holds the record for the longest burning lightbulb. The Livermore-Pleasanton Fire
  Department maintains the bulb in LPFD Station 6. The bulb was manufactured by the Shelby Electric Company in the late 1890s.


  The bulb has been moved at least three times, most recently in 1976 when it was offline for 22 minutes before being installed
  in its current location.'
