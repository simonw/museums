id: 59
name: Dejima
url: https://nagasakidejima.jp/en/
address: 6-1 Dejimamachi, Nagasaki, 850-0862, Japan
description: 'For 220 years between 1633 and 1853 Japan adopted a strictly isolationist foreign policy, with severely limited
  trade between Japan and other countries. One of the only exceptions was trade with the Dutch through a trading post on the
  artificial island of Dejima, first built in 1634 to house Portuguese traders but then repurposed for trade with the Dutch
  East India Company in 1641.


  Isolation ended with the Treaty of Kanagawa in 1858 and Dejima merged into Nagasaki through land reclamation, but in 1922
  it was designated a national historic site and intermittent efforts began to restore the island.


  Today Dejima serves as a museum: many historic buildings have been restored, and the island hosts a scale model illustrating
  how it was laid out during the Edo period.'
