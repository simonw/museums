id: 61
name: The Tonga Room
url: https://www.tongaroom.com/
address: 950 Mason Street, San Francisco, CA 94108
description: 'A 75-year-old San Francisco institution, the Tonga Room & Hurricane Bar is a legendary tiki bar located in the
  basement of the Fairmont Hotel.


  It was designed in 1945 by Mel Melvin, a leading set designer for MGM on the site of the hotel''s indoor swimming pool.
  The pool was converted into a "lagoon" in the center of the space, and most nights a band performs from a boat in the lagoon
  amidst periodic artificial rain and thunder. The dance floor and bar itself is constructed from wood salvaged from the S.S.
  Forester, a schooner that once sailed between San Francisco and the south Pacific.


  The Fairmont appear to be deeply embarassed by the continued presence of the Tonga Room but the city of San Francisco have
  labelled it a "historic resource", frustrating plans to replace it with something better suited to the hotel''s upscale
  aesthetic.'
