id: 62
name: London Silver Vaults
url: https://silvervaultslondon.com/
address: 53-64 Chancery Lane, Holborn, London WC2A 1QS, United Kingdom
description: 'Located five storeys beneath the streets of London, the London Silver Vaults represent the largest retail selection
  of antique and contemporary silver in the world.


  30 shops are located within this subterranean market, most of which have been owned by the same families for more than fifty
  years.


  The complex opened as The Chancery Lane Safe Deposit in 1885, survived a direct bomb hit to the surface building during
  World War II and started trading in its current retail format in 1953.


  Rumored to be the inspiration for the Gringotts bank in Harry Potter, today the stores in the vaults sell a bewildering
  array of silver items from cutlery to condiment carrying table-top sailing ships.


  Entrance is free, you just need to know how to find them.'
