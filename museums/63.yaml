name: Rosie the Riveter National Historical Park
url: https://www.nps.gov/rori/index.htm
address: 1414 Harbour Way South, Richmond, CA 94804
description: 'During World War II the city of Richmond grew from 24,000 to 100,000 people as the four Richmond shipyards ramped
  up production for the war effort.


  Workers produced 747 Victory and Liberty ships, more than any other US industrial location. Many of those workers were women
  and African-Americans entering the industrial workforce for the first time.


  Rosie the Riveter emerged as a cultural icon representing those women, and the Rosie the Riveter/World War II Home Front
  National Historical Park commemorates those workers and tells their stories.


  On many Fridays home front workers who worked in Richmond during WWII are available to answer your questions.'
