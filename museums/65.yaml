id: 65
name: Aye-Aye Island
address: Aye-Aye Island, Mananara, Madgascar
description: 'The aye-aye is an endangered species of long-fingered lemur, and the world''s largest nocturnal primate.


  Aye-ayes have really interesting fingers: their third finger is used for percussive foraging, where they tap on a trunk
  to find hollow points. Their long hooked fourth finger is then used to pull bugs out of those hollows. They are notoriously
  difficult to see in the wild due to their rarity, nocturnal habits and tendency to spend most of their time in trees above
  the 70 meter mark.


  Aye-Aye Island is a small private wildlife reserve which is home to over a dozen aye-ayes, relocated from elsewhere on Madagascar
  to protect them from threats that sadly include killings based on superstition. Each night guides leave coconuts wedged
  in trees and bring small groups to the island to watch the aye-ayes enthusiastically devouring them with their long fingers.


  Tours can be booked through local hotels - we got ours via the nearby Palmarium.'
