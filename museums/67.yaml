name: Alverstone Mead Red Squirrel Hide
url: http://www.wightnaturefund.org.uk/Alverstone%20Mead
address: Burnt House Lane, Alverstone, Sandown, PO36 0HB, Isle of Wight
description: 'Red squirrels are almost extinct in the United Kingdom, due to competition from the invasive North American
  eastern grays. The exceptions are some areas in Scotland and the Isle of Wight, an island just off the south coast of England.


  We spent a while trying to find red squirrels and eventually got lucky at this small hide near the village of Alverstone.
  The squirrels here are bold, inquisitive and sinusoidal. They have tufty little ears and a delightfully squirrelly nature.'
