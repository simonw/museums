name: Mail Rail
url: https://www.postalmuseum.org/discover/attractions/mail-rail-ride/
address: 15-20 Phoenix Place, London WC1X 0DL, United Kingdom
description: 'The London Post Office Railway (rebranded Mail Rail in 1987) was conceived in 1911 in response to congestion
  on London’s road networks, and opened in 1927 as the world’s first electric railway with driverless trains.


  At its peak the railway carried 4 million letters a day across 22 miles of narrow gauge underground track spanning a distance
  of 6.5 miles from Paddington in the west to Whitechapel in the east.


  The railway stayed in operation for 76 years. It closed in May 2003 over cost concerns: the railway was 3-5 times more expensive
  than road transport for the same task.


  Urban explorers published illicit photographs of the network in April 2011 showing it to be largely in good condition. In
  October 2013 the British Postal Museum & Archive announced plans to open parts of the network to the public, and on 5th
  September 2017 opened an attraction featuring new custom passenger rail cars running through the tunnels.


  During its lifetime the railway was strictly for mail only. As a result the new passenger carriages are a very tight fit
  - bags need to be left in a locker, and if you’re claustrophobic you may have second thoughts! The ride lasts 15 minutes
  and includes numerous stops with well designed video presentations projected onto the walls outside the carriage.


  The ride ends at the maintenance depot which exhibits historic rail cars and switching equipment. Tickets to Mail Rail also
  cover entrance to the nearby Postal Museum.'
