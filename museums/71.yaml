name: Bank of England Museum
url: https://www.bankofengland.co.uk/museum/
address: Bartholomew Lane, London, EC2R 8AH, United Kingdom
description: 'The Bank of England really wants you to understand quantitative easing. Their museum has multiple displays on
  the subject, plus two interactive games - one of which sees you attempting to sail a boat through stormy financial waters,
  applying quantitative easing in an attempt to keep inflation to the magic level of 2%.


  More importantly though: they have a real gold bar in a cage, which you can both touch and pick up to see how heavy it is!'
