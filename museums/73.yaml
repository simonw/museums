name: Buckfast Abbey
url: https://www.buckfast.org.uk/
address: Buckfast Abbey, Buckfastleigh, TQ11 0EE, United Kingdom
description: 'Buckfast has been home to an abbey since 1018, albeit with numerous changes in circumstance. The monastery was
  dissolved in 1539, then refounded by French Benedictine monks in 1882. Today’s church was completed in 1938.


  The Abbey is self-supporting, most notoriously through the production of Buckfast Tonic Wine. Variously known as "Wreck
  the Hoose Juice", "Commotion Lotion”, "Cumbernauld Rocket Fuel” and more this fortified wine is highly caffeinated and has
  been widely associated with anti-social behaviour in Scotland.


  The Abbey staff generally dislike questions about the wine’s violent reputation, but they do sell bottles of it in the Abbey
  gift shop.'
