id: 74
name: Dennis Severs’ House
url: https://www.dennissevershouse.co.uk/
address: 18 Folgate Street, Spitalfields, London E1 6BX, United Kingdom
description: 'A three-dimensional historical novel. American artist Dennis Severs moved to London in 1967 and bought this
  Georgian terraced house in 1979. He spent the next twenty years refurbishing the ten rooms in the house to tell the story
  of two hundred years of occupation by an imaginary family of Huguenot immigrants.


  Each room is intended to give the impression that the occupants have just left, with hidden audio tracks, scents and half-eaten
  bread adding to the atmosphere.


  Today the house is maintained by the Spitalfields Historic Buildings Trust, who open it to the public and also run occasional
  candle-lit evening tours.'
