address: 16 Colebrooke Row, Islington, London, N1 8DB, United Kingdom
description: 'David and Margaret Webb started restoring vintage Jukeboxes over twenty years ago. Their showroom in an Islington
  townhouse displays a dazzling array of Jukeboxes dating back to the 1940s, all of which are in working order.


  Call them to book an appointment and they will show you around and demonstrate the Jukeboxes working for you. They sell
  about ten a year, but only to customers who can be trusted to look after them properly.'
