id: 76
name: Stonehenge
url: https://www.english-heritage.org.uk/visit/places/stonehenge/
address: Amesbury, Wiltshire, SP4 7DE, United Kingdom
description: 'England''s most famous Neolithic monument. Constructed between 3000 and 2000 BC, and legally protected since
  the Ancient Monuments Protection Act of 1882. How it was built and what it was built for remain subject to debate.


  Ask the guides up by the Henge about the rooks - if you are lucky they might be feeding them. We visited the day before
  the winter solstice and saw an entire bus load of druids and some Morris dancers.'
