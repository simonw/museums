name: Yolo Causeway Bat Colony
url: http://yolobasin.org/battalkandwalks/
address: 45211 County Road 32B, Davis, CA 95618, United States
description: 'Every summer the Yolo Causeway between Davis and Sacramento plays host to enormous numbers of migratory Mexican
  free-tailed bats - the largest colony of these bats in California. The bats emerge together in spectacular long ribbons
  at dusk as they head out to hunt.


  The current causeway was built in 1962, with expansion joints that turned out to be the perfect roosting spot for bats.
  Today the bat population peaks at around 250,000 individuals. They feed on insects in the nearby wetlands and give birth
  to baby bats in mid-June.


  The Yolo Basin Foundation offers Bat Talk & Walks during bat season. This is by far the best way to see the bats as the
  ideal viewing spots for the flyouts are in areas of the wetlands that are not generally open to the public.


  The bat talk usually features rescued bats so you can see what they look like up close!'
