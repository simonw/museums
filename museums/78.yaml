name: Horniman Museum and Gardens
url: https://www.horniman.ac.uk/
address: 100 London Road, Forest Hill, London SE23 3PQ, United Kingdom
description: 'The Horniman museum in Forest Hill, south London was opened in 1901 by Frederick John Horniman, heir to the
  world''s largest tea trading business.


  Frederick was a lifelong collector, focusing on natural history, anthropology and musical instruments. His collection of
  30,000 items formed the basis of the museum''s collection, which has since grown to more than 350,000 items, continuing
  to focus on those three topics.


  The most famous item in the Horniman is a stuffed walrus, first displayed at the Colonial and Indian Exhibition in South
  Kensington in 1886. The walrus originated in eastern Canada but was stuffed in England, apparently by a taxidermist who
  had never seen a walrus and assumed that it should be stuffed until the wrinkles smoothed out. Today you can follow [the
  walrus on Twitter](https://twitter.com/hornimanwalrus).'
