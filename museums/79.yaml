name: Southern Food and Beverage Museum
url: https://natfab.org/southern-food-and-beverage
address: 1504 Oretha Castle Haley Boulevard, New Orleans, LA 70113
description: 'New Orleans is *really* good at food. The Southern Food & Beverage Museum helps explain why.


  Founded in 2004, and relocated a couple of times until it reached its current location in September 2014, the museum has
  exhibits covering food cultures from throughout the American south and detailed exhibits on the foods of Louisiana.


  Popeyes Chicken founder Al Copeland has his own area, which includes his 1986 Scoville Unit chromatography device and an
  original Satisfryer device custom built for Al’s restaurants.


  The museum includes a museum-within-a-museum: The Museum of the American Cocktail, which displays cocktail items dating
  all the way back to the 1750s. Also present is La Galerie de l''Absinthe, the largest collection of Absinthe artifacts in
  the USA.


  SoFAB hosts frequent cooking demonstrations by local chefs, and shares space with Toups South, a highly rated brunch and
  dinner restaurant.'
