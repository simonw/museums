name: Jigokudani Monkey Park
url: http://en.jigokudani-yaenkoen.co.jp/
address: 〒381-0401 Nagano, Shimotakai District, Yamanochi, Hirao, ６８４５, Japan
description: 'As ski resorts developed in the 1950s, Japanese macaques (often referred to as snow monkeys) were forced to
  migrate to the lower mountain regions including the human occupied areas of Yamanouchi.


  A guesthouse there called Korakukan featured an outdoor onsen - a hot spring bath - and the monkeys imitated human bathers
  and started enjoying the hot baths themselves.


  Since the human population didn''t particularly want to share their baths with the monkeys, a compromise was reached: in
  1964 a set of hot spring baths were constructed for the monkeys to enjoy by themselves.


  Guides make food available to the monkeys, encouraging them to stay in the area all year round. They are still very much
  wild creatures though, and they return to the safety of the forests in the evenings.


  We stayed at the nearby Kokuya ryokan - a 400 year old guesthouse with eight of its own private hot spring baths - and it
  was absolutely magical.'
