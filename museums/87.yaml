id: 87
name: Sea Lions at Pier 39
url: https://www.pier39.com/the-sea-lion-story/
address: Pier 39, The Embarcadero at Beach Street, San Francisco, CA 94133
description: 'Shortly before the 1989 Loma Prieta earthquake, sea lions started to haul out onto K dock at Pier 39 in San
  Francisco. Their numbers steadily increased, and their protected status lead to a quandary for the pier’s management team.
  They decided to relinquish the dock to the pinnipeds, and thirty years later the sea lions have established themselves as
  a San Francisco fixture.


  There are usually between 150 and 600 sea lions at the pier, mostly male and weighing up to 850lb (390kg). Their numbers
  drop in June and July when most of them head south to the Channel Islands for breeding season. The highest recorded count
  was 1,701 in November 2009.


  The Aquarium of the Bay operates a Sea Lion Center upstairs from the sea lions themselves which has interactive displays
  and educational videos.'
