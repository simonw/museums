id: 89
name: Cohen Bray House
url: https://www.cohenbrayhouse.org/
address: 1440 29th Ave, Oakland, CA 94601
description: 'The Cohen Bray House in Oakland was built in 1882-1884 as a wedding present for Emma Bray and Alfred H. Cohen.
  The house is a relatively rare example of the Stick-Eastlake style of the late 19th century, but what really sets it apart
  is its interior, which maintains the aesthetic style popular when it was built. The house has remained in the same family
  for its entire history, and today that family preserve it as an Oakland Historical Landmark with the assistance of volunteers.


  Tours are offered on the fourth Sunday of every month, and twice a year the house offers a tour with High Tea in the formal
  dining room. We did this in January 2020 and the tea was most excellent.'
