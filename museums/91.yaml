id: 91
name: Bevolo Gas Light Museum
url: https://bevolo.com/
address: 521 Conti Street, New Orleans, LA 70130
description: 'Bevolo is a family business founded in 1945 in the New Orleans French Quarter who today are the largest manufacturer
  of handmade copper lanterns in the United States.


  Their lamps are hand-riveted (as opposed to soldered) which they claim gives them improved longevity.


  Their workshop and museum offers the chance to watch the lamp makers in action, and see examples of historic street lamps
  from the French Quarter.'
