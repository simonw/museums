id: 92
name: Museo de las Misiones de Baja California
address: Salvatierra 16, Centro, 23880 Loreto, Mexico
description: 'The town of Loreto was founded in 1697 at the Monqui Native American settlement of Conchó. Jesuit missionaries
  founded the town as the first Spanish colonial settlement on the Baja California Peninsula.


  The Mission of our Lady of Loreto that they built there formed the start of El Camino Real ("The Royal Road"), a historic
  chain of missions that stretched all the way up to Sonoma in California, 1069 miles to the North.


  The Museo de las Misiones is a small museum that documents the history of the missions. It includes archeological remains,
  weapons, paintings and historic sacred documents. It also features a church bell that fell into the sea in 1875 and was
  retrieved by fishermen a hundred years later.


  The museum celebrates the Jesuits as "men of extraordinary intellectual and moral character", but in places it does hint
  at their contribution to the demise of indigenous cultures.'
