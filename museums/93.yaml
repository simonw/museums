name: Fort Point
address: Long Avenue & Marine Drive, San Francisco, CA 94129
url: https://www.nps.gov/fopo/
description: 'Constructed by the US Army Corp of Engineers between 1853 and 1861 at the height of the gold rush, Fort Point
  was designed to protect the San Francisco Bay from foreign attack.


  Cannons were mounted close to the waterline so that cannonballs could ricochet off the water and hit enemy ships hear the
  waterline.


  The fort has never seen battle, but is historically significant due to its military architecture. It is the only "Third
  System" fort to be constructed west of the Mississippi.


  Following the civil war, the fort''s cannons became obsolete. It was used intermittently by the army, mainly as barracks,
  and then served as defense against potential submarine attacks during the Second World War.


  A campaign in the 1930s saved the fort from demolition during the construction of the Golden Gate Bridge, which was redesigned
  to arch over the fort instead. It became a National Historic Site in 1970.'
