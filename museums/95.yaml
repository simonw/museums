name: Anja Community Reserve
url: http://anjareserve.angelfire.com/
address: Manambolo, Madagascar
wikipedia_url: https://en.wikipedia.org/wiki/Anja_Community_Reserve
description: 'Anja Community Reserve is home to the world''s highest concentration of ring-tailed lemurs - roughly 350 individuals
  divided into troops that range in size up to 30 members.


  Development of the reserve started in 1996 when the government enacted legislation to transfer responsibility for land management
  to local communities. A group of twenty youths from the Anja area worked to create a reserve, and the reserve received formal
  recognition in 1999.


  In 2001 the Anja Miray Association was formed to manage the reserve and nearby land, and by 2011 the reserve had created
  more than 450 jobs and had become one of the most-visited community managed sites in all of Madagascar. Today it serves
  as a model for other community-based tourism projects throughout Madagascar and the world.


  Visitors must be accompanied by a local guide. The lemurs are plentiful and extremely photogenic.'
