name: The ruins of Llano del Rio
address: Llano, CA 93544
wikipedia_url: https://en.wikipedia.org/wiki/Llano_del_Rio
description: 'Job Harriman was the most prominent Californian socialist of the early 1900s. In 1900 he ran as Vice President
  on the Socialist Party of America ticket. In 1911 and 1913 he made competitive runs on the Socialist ticket for Mayor of
  Los Angeles.


  Following his second mayoral defeat he switched to a different path: he purchased a 2,000 acre patch of land in the Mojave
  Desert with the intention of building a self-sufficient commune that could embody socialist principles.


  The colony officially opened in May 1914 with just five residents. By early 1915 it had grown to 150, and the population
  peaked at 1100 in summer 1917. The colony only admitted caucasians - a thoroughly racist policy that was excused as being
  “not due to race prejudice but because it is not deemed expedient to mix the races in these communities”.


  Designs for the colony were prepared by Alice Constance Austin, a feminist architect and city planner who later wrote an
  influential book about city planning. She envisioned a community where the kitchens and laundry were centralized via a network
  of underground rail tunnels, freeing each household from maintaining their own kitchens and cooking their own meals.


  Alice’s designs were never implemented. By 1918 the colony had been abandoned - political dissent within the commune and
  California’s refusal to permit the construction of a water-providing dam led to a torrent of departures, and the Llano Del
  Rio Company declared bankruptcy in 1918.


  200 members relocated to Louisiana, where they established the town of New Llano and operated it as a socialist commune
  until 1937. That town still exists today.


  100 years later the ruins of Llano del Rio can still be found along California Highway 138. A Google Maps review warned
  us that it''s only home to rattlesnakes today, but sadly we were unable to find any.'
