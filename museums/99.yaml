wikipedia_url: https://en.wikipedia.org/wiki/New_Orleans_Historic_Voodoo_Museum
description: 'Voodoo first came to Louisiana with West African slaves in the early 1700s. It combined cultural practices and
  beliefs from multiple African groups, most prominently the Fon people from what is now Benin.


  Louisiana Voodoo ended up syncretizing aspects of Catholicism. Themes that are distinctive to Louisiana Voodoo include gris-gris
  (protective amulets) and Voodoo queens, of which Marie Laveau is the most famous, active for much of the 19th century.


  Local artist Charles Massicot Gandolfo created the New Orleans Historic Voodoo Museum museum in the French Quarter in 1972.
  He founded the museum along with his younger brother Jerry Gandolfo who still owns it today.


  The museum’s collection is displayed in two small rooms connected by a cramped corridor. It includes antique voodoo dolls,
  talismans, taxidermy and multiple altars, some of which are used by Voodoo practitioners today. The museum also has a kneeling
  bench that belonged to Marie Laveau.'
